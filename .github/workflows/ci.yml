name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -coverprofile=coverage.out -coverpkg=./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Generate RBAC bundle
        run: make gen-rbac-bundle
      - name: Verify bundle exists
        run: test -f rbac.rego
      - name: Verify bundle contents
        run: |
          grep -q "package identity_auth" rbac.rego
          grep -q "allow {" rbac.rego
          grep -q "role_permissions" rbac.rego
