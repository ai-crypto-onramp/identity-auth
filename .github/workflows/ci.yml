name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - run: go mod download
      - run: go build ./cmd/... ./internal/...
      - run: go test ./cmd/... ./internal/... -race -coverprofile=coverage.out -coverpkg=./cmd/...,./internal/...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Generate RBAC bundle
        run: make gen-rbac-bundle
      - name: Verify bundle exists
        run: test -f rbac.rego
      - name: Verify bundle contents
        run: |
          grep -q "package identity_auth" rbac.rego
          grep -q "allow {" rbac.rego
          grep -q "role_permissions" rbac.rego